name: CI/CD Pipeline

on:
  push:
    branches: [ prod, develop ]
  pull_request:
    branches: [ prod, develop ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, destroy]
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

env:
  AWS_REGION: us-east-1
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ==========================================
  # 1. Build & Test Job
  # ==========================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'deploy'
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: game_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests
        run: ./mvnw clean test
        env:
          SPRING_PROFILES_ACTIVE: test
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_DB: game_db
          MYSQL_USER: root
          MYSQL_PASS: root

      - name: Package Application
        run: ./mvnw clean package -DskipTests

  # ==========================================
  # 2. Infrastructure & App Deployment Job
  # ==========================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: |
      (github.ref == 'refs/heads/prod' || github.ref == 'refs/heads/develop') && 
      (github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'deploy')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine Environment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" = "refs/heads/prod" ]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform init -reconfigure

      - name: Terraform Plan
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          terraform plan \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="ses_username=${{ secrets.SES_USERNAME }}" \
            -var="ses_password=${{ secrets.SES_PASSWORD }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform apply -auto-approve tfplan

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          # Fetch ECR URL from Terraform Outputs
          cd terraform/environments/${{ env.ENVIRONMENT }}
          ECR_URL=$(terraform output -raw ecr_repository_url)
          cd ../../..
          
          # Build, Tag and Push
          docker build -t $ECR_URL:${{ env.IMAGE_TAG }} -t $ECR_URL:latest .
          docker push $ECR_URL:${{ env.IMAGE_TAG }}
          docker push $ECR_URL:latest

      - name: Update ECS Service
        run: |
          # Fetch Cluster and Service names from Terraform Outputs
          cd terraform/environments/${{ env.ENVIRONMENT }}
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SERVICE=$(terraform output -raw ecs_service_name)
          
          # Force deployment
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

  # ==========================================
  # 3. Infrastructure Destruction Job
  # ==========================================
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform init -reconfigure

      - name: Terraform Plan (Destroy)
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: |
          terraform plan -destroy \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="ses_username=${{ secrets.SES_USERNAME }}" \
            -var="ses_password=${{ secrets.SES_PASSWORD }}" \
            -out=destroyplan

      - name: Terraform Destroy
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform apply -auto-approve destroyplan