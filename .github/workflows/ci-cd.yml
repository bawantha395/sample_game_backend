name: CI/CD Pipeline

on:
  push:
    branches: [ prod, develop ]
  pull_request:
    branches: [ prod, develop ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
      environment:
        description: 'Environment to target'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # Build and Test
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'deploy'
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: game_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run tests
        run: ./mvnw clean test
        env:
          SPRING_PROFILES_ACTIVE: test
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_DB: game_db
          MYSQL_USER: root
          MYSQL_PASS: root

      - name: Build application
        run: ./mvnw clean package -DskipTests

  # Deploy Infrastructure and Application
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: (github.ref == 'refs/heads/prod' || github.ref == 'refs/heads/develop') && (github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'deploy')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" = "refs/heads/prod" ]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        id: terraform
        run: |
          cd terraform
          terraform init -backend-config="environments/${{ env.ENVIRONMENT }}/backend.hcl" -reconfigure
          terraform apply -auto-approve -var-file="environments/${{ env.ENVIRONMENT }}/terraform.tfvars" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="ses_username=${{ secrets.SES_USERNAME }}" \
            -var="ses_password=${{ secrets.SES_PASSWORD }}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Get ECR URL from terraform output
          cd terraform
          ECR_REPOSITORY_URL=$(terraform output -raw ecr_repository_url)
          cd ..
          
          docker build -t $ECR_REPOSITORY_URL:${{ env.IMAGE_TAG }} .
          docker build -t $ECR_REPOSITORY_URL:latest .
          docker push $ECR_REPOSITORY_URL:${{ env.IMAGE_TAG }}
          docker push $ECR_REPOSITORY_URL:latest
          
          echo "ECR_REPOSITORY_URL=$ECR_REPOSITORY_URL" >> $GITHUB_ENV

      - name: Update ECS Service
        run: |
          cd terraform
          CLUSTER_NAME=$(terraform output -raw ecs_cluster_name)
          SERVICE_NAME=$(terraform output -raw ecs_service_name)
          cd ..
          
          aws ecs update-service \
            --cluster $CLUSTER_NAME \
            --service $SERVICE_NAME \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

  # Destroy Infrastructure
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Destroy
        run: |
          cd terraform
          terraform init -backend-config="environments/${{ github.event.inputs.environment }}/backend.hcl" -reconfigure
          terraform destroy -auto-approve -var-file="environments/${{ github.event.inputs.environment }}/terraform.tfvars" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="ses_username=${{ secrets.SES_USERNAME }}" \
            -var="ses_password=${{ secrets.SES_PASSWORD }}"